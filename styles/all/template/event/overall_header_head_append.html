<!-- IF S_HELPDESKKB_INDEX or S_HELPDESKKB_CATEGORY or S_HELPDESKKB_ARTICLE or S_HELPDESKKB_POSTING_SUGGESTIONS -->
<link href="{ROOT_PATH}ext/mundophpbb/helpdeskkb/styles/all/theme/helpdeskkb.css?assets_version={T_ASSETS_VERSION}" rel="stylesheet">
<!-- ENDIF -->

<!-- IF S_HELPDESKKB_POSTING_SUGGESTIONS -->

<script>
document.addEventListener('DOMContentLoaded', function () {
    var box = document.getElementById('helpdeskkb-posting-suggestions');
    var input = document.getElementById('subject');
    if (!box || !input) {
        return;
    }

    var url = box.getAttribute('data-url') || '';
    var minChars = parseInt(box.getAttribute('data-min-chars') || '4', 10);
    var titleNode = box.querySelector('[data-role="title"]');
    var explainNode = box.querySelector('[data-role="explain"]');
    var statusNode = box.querySelector('[data-role="status"]');
    var listNode = box.querySelector('[data-role="list"]');
    var timer = null;
    var lastQuery = '';

    function currentDepartmentKey() {
        var selectors = [
            'select[name="department_key"]',
            'input[name="department_key"]',
            'select[name="helpdesk_department_key"]',
            'input[name="helpdesk_department_key"]'
        ];
        for (var i = 0; i < selectors.length; i++) {
            var field = document.querySelector(selectors[i]);
            if (field && field.value) {
                return field.value;
            }
        }
        return '';
    }

    function setStatus(text) {
        if (statusNode) {
            statusNode.textContent = text || '';
        }
    }

    function clearList() {
        if (listNode) {
            listNode.innerHTML = '';
        }
    }

    function renderItems(items) {
        clearList();
        if (!listNode) {
            return;
        }
        items.forEach(function (item) {
            var wrap = document.createElement('div');
            wrap.className = 'helpdeskkb-posting-item';

            var link = document.createElement('a');
            link.className = 'helpdeskkb-posting-item-title';
            link.href = item.url;
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = item.title || '';
            wrap.appendChild(link);

            if (item.summary) {
                var summary = document.createElement('div');
                summary.className = 'helpdeskkb-posting-status';
                summary.textContent = item.summary;
                wrap.appendChild(summary);
            }

            var meta = document.createElement('div');
            meta.className = 'helpdeskkb-posting-item-meta';
            if (item.category) {
                var cat = document.createElement('span');
                cat.className = 'helpdeskkb-pill';
                cat.textContent = item.category;
                meta.appendChild(cat);
            }
            var open = document.createElement('a');
            open.className = 'button2';
            open.href = item.url;
            open.target = '_blank';
            open.rel = 'noopener';
            open.textContent = box.getAttribute('data-open-label') || 'Open article';
            meta.appendChild(open);
            wrap.appendChild(meta);

            listNode.appendChild(wrap);
        });
    }

    function fetchSuggestions() {
        var query = (input.value || '').trim();
        if (query === lastQuery) {
            return;
        }
        lastQuery = query;

        if (query.length < minChars) {
            clearList();
            setStatus(box.getAttribute('data-min-label') || '');
            return;
        }

        setStatus(box.getAttribute('data-loading-label') || '');
        var fullUrl = url + (url.indexOf('?') === -1 ? '?' : '&') + 'q=' + encodeURIComponent(query) + '&department_key=' + encodeURIComponent(currentDepartmentKey());
        fetch(fullUrl, {credentials: 'same-origin'})
            .then(function (response) { return response.json(); })
            .then(function (data) {
                if (!data || !data.items || !data.items.length) {
                    clearList();
                    setStatus(box.getAttribute('data-empty-label') || '');
                    return;
                }
                renderItems(data.items);
                setStatus('');
            })
            .catch(function () {
                clearList();
                setStatus(box.getAttribute('data-empty-label') || '');
            });
    }

    function schedule() {
        window.clearTimeout(timer);
        timer = window.setTimeout(fetchSuggestions, 280);
    }

    input.addEventListener('input', schedule);
    input.addEventListener('change', schedule);
    var deptField = document.querySelector('select[name="department_key"], input[name="department_key"], select[name="helpdesk_department_key"], input[name="helpdesk_department_key"]');
    if (deptField) {
        deptField.addEventListener('change', schedule);
    }
    schedule();
});
</script>
<!-- ENDIF -->
